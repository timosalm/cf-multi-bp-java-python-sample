---
applications:
  - name: spring-python-demo
    memory: 1G
    disk_quota: 2G
    buildpacks:
      - python_buildpack
      - java_buildpack_offline
    path: deploy
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      PYTHON_EXECUTABLE: /home/vcap/app/python_env/bin/python
      PYTHON_SCRIPT_PATH: /home/vcap/app/scripts/hello.py
